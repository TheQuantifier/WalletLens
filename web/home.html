<!DOCTYPE html>
<html lang="en">
<head>
<script>
    (function () {
      const rawPage = (window.location.pathname.split("/").pop() || "").toLowerCase();
      const currentPage = rawPage === "" ? "index.html" : rawPage;
      const cachedTitle = sessionStorage.getItem(`pageTitle:${currentPage}`);
      if (cachedTitle) {
        document.title = cachedTitle;
      }
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&lt;AppName&gt; - Home</title>

  <!-- Meta -->
  <meta name="description" content="View spending reports, category breakdowns, and monthly trends." />
  <meta name="author" content="&lt;AppName&gt;" />
  <link rel="icon" type="image/png" href="images/favicon.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles/default.css" />
  <link rel="stylesheet" href="styles/home.css" />

  <script>
    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/entries/home.jsx"></script>
  <script src="scripts/default.js" type="module" defer></script>
  <script src="scripts/home.js" type="module" defer></script>
</body>
</html>
