<!DOCTYPE html>
<html lang="en">
<head>
<script>
    (function () {
      const rawPage = (window.location.pathname.split("/").pop() || "").toLowerCase();
      const currentPage = rawPage === "" ? "index.html" : rawPage;
      const cachedTitle = sessionStorage.getItem(`pageTitle:${currentPage}`);
      if (cachedTitle) {
        document.title = cachedTitle;
      }
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&lt;AppName&gt; - Upload</title>

  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="stylesheet" href="styles/default.css" />
  <link rel="stylesheet" href="styles/upload.css" />

  <script>
    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/entries/upload.jsx"></script>
  <script src="scripts/default.js" type="module" defer></script>
  <script src="scripts/upload.js" type="module" defer></script>
</body>
</html>
