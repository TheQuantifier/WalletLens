<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      const rawPage = (window.location.pathname.split("/").pop() || "").toLowerCase();
      const currentPage = rawPage === "" ? "index.html" : rawPage;
      const cachedTitle = sessionStorage.getItem(`pageTitle:${currentPage}`);
      if (cachedTitle) {
        document.title = cachedTitle;
      }
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&lt;AppName&gt; - Recurring</title>

  <meta name="description" content="Manage recurring transactions and upcoming schedules." />
  <link rel="icon" type="image/png" href="images/favicon.png" />

  <link rel="stylesheet" href="styles/default.css" />
  <link rel="stylesheet" href="styles/recurring.css" />

  <script>
    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
</head>

<body>
  <div id="header"></div>

  <main class="main main--recurring">
    <section class="recurring-hero">
      <div>
        <h1>Recurring Transactions</h1>
        <p class="subtle">
          Automate bills, subscriptions, and income. Upcoming occurrences are created automatically.
        </p>
      </div>
      <div class="recurring-hero-actions">
        <button class="btn btn--primary" id="btnCreateRecurring" type="button">Create Recurring</button>
      </div>
    </section>

    <section class="recurring-section">
      <div class="recurring-header">
        <h2>Active Schedules</h2>
        <p id="recurringStatus" class="status-banner subtle is-hidden" aria-live="polite"></p>
      </div>
      <div id="recurringEmpty" class="recurring-empty card">
        <h3>No recurring schedules yet</h3>
        <p class="subtle">Create your first schedule from a record or from scratch.</p>
        <button class="btn btn--primary" id="btnCreateRecurringEmpty" type="button">Create Recurring</button>
      </div>
      <div id="recurringList" class="recurring-grid"></div>
    </section>

    <section class="recurring-section">
      <div class="recurring-header">
        <h2>Upcoming</h2>
        <span class="subtle">Next 30 days</span>
      </div>
      <div class="card recurring-upcoming">
        <div id="recurringUpcoming" class="recurring-upcoming-list">
          <p class="subtle">Loading upcoming occurrences…</p>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <!-- Create/Edit Modal -->
  <div id="recurringModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="recurringModalTitle">
    <div class="modal-content recurring-modal">
      <h2 id="recurringModalTitle">Create Recurring</h2>

      <form id="recurringForm" class="recurring-form">
        <div class="form-row">
          <label>
            <span>Name</span>
            <input type="text" id="recurringName" required placeholder="e.g., Netflix subscription" />
          </label>
          <label>
            <span>Type</span>
            <select id="recurringType">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            <span>Amount</span>
            <input type="number" id="recurringAmount" step="0.01" min="0" required placeholder="0.00" />
          </label>
          <label>
            <span>Category</span>
            <select id="recurringCategory" required>
              <option value="" disabled selected>Select a category</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            <span>Note</span>
            <input type="text" id="recurringNote" placeholder="Optional note" />
          </label>
        </div>

        <div class="form-row">
          <label>
            <span>Frequency</span>
            <select id="recurringFrequency">
              <option value="weekly">Weekly</option>
              <option value="biweekly">Biweekly</option>
              <option value="monthly" selected>Monthly</option>
              <option value="quarterly">Quarterly</option>
              <option value="yearly">Yearly</option>
            </select>
          </label>
          <label>
            <span>Day of month</span>
            <input type="number" id="recurringDayOfMonth" min="1" max="31" placeholder="e.g., 15" />
          </label>
        </div>

        <div class="form-row">
          <label>
            <span>Start date</span>
            <input type="date" id="recurringStartDate" required />
          </label>
          <label>
            <span>End date (optional)</span>
            <input type="date" id="recurringEndDate" />
          </label>
        </div>

        <div class="form-row form-row--compact">
          <label class="checkbox-inline">
            <input type="checkbox" id="recurringActive" checked />
            <span>Active</span>
          </label>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn--primary" id="recurringSaveBtn">Save</button>
          <button type="button" class="btn" id="recurringCancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="scripts/default.js" type="module" defer></script>
  <script src="scripts/recurring.js" type="module" defer></script>
</body>
</html>
